name: Manual Release (auto-bump)

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release (major | minor | patch)"
        required: true
        default: "patch"
      skip_tests:
        description: "Skip tests"
        required: false
        default: false
        type: boolean

permissions:
  contents: write  # needed to push commit + tag
  pull-requests: write  # needed to open the post-release dev-bump PR

jobs:
  tests:
    if: github.event.inputs.skip_tests != 'true'
    uses: ./.github/workflows/tests.yaml

  release:
    needs: tests
    if: always() && (needs.tests.result == 'success' || github.event.inputs.skip_tests == 'true') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce main branch
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "ERROR: Release workflow must be run from main (got ${GITHUB_REF})"
            exit 1
          fi

      - name: Validate input
        shell: bash
        run: |
          case "${{ github.event.inputs.release_type }}" in
            major|minor|patch) echo "Release type OK";;
            *) echo "Invalid release_type. Use: major | minor | patch"; exit 1;;
          esac

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install tools
        run: pip install toml

      - name: Bump version in pyproject, __init__, and README
        id: bump
        shell: bash
        run: |
          python - <<'PY'
          import re, toml, pathlib, sys

          release_type = "${{ github.event.inputs.release_type }}".strip()
          root = pathlib.Path(".")

          # --- Read current version from pyproject.toml
          pp = root / "pyproject.toml"
          data = toml.load(pp.open())
          try:
              current = data["project"]["version"]
          except KeyError:
              print("pyproject.toml missing [project].version", file=sys.stderr)
              sys.exit(1)

          m = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)(?:-(dev))?", current)
          if not m:
              print(f"Current version not simple x.y.z or x.y.z-dev: {current}", file=sys.stderr)
              sys.exit(1)

          major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))
          is_dev = bool(m.group(4))

          if is_dev:
              if release_type == "major":
                  major, minor, patch = major + 1, 0, 0
              elif release_type == "minor":
                  minor, patch = minor + 1, 0
              else:  # patch
                  pass # drop -dev suffix only
          else:
              if release_type == "major":
                  major, minor, patch = major + 1, 0, 0
              elif release_type == "minor":
                  minor, patch = minor + 1, 0
              else:  # patch
                  patch += 1

          new_version = f"{major}.{minor}.{patch}"
          next_dev_version = f"{major}.{minor}.{patch + 1}-dev"

          # --- Write back pyproject.toml
          data["project"]["version"] = new_version
          pp.write_text(toml.dumps(data))

          # --- spikee/__init__.py
          initp = root / "spikee" / "__init__.py"
          initp.write_text(f'__version__ = "{new_version}"\n')

          # --- README.md (_Version: x.y.z_)
          readme = root / "README.md"
          if readme.exists():
              txt = readme.read_text()
              new_txt, n = re.subn(r"(_Version:\s*)(\d+\.\d+\.\d+(?:-dev)?)(\s*_)",
                                   rf"\g<1>{new_version}\3", txt, count=1)
              if n:
                  readme.write_text(new_txt)
                  print("Updated README.md version.")
              else:
                  print("NOTE: README.md version pattern not found; left unchanged.")
          else:
              print("NOTE: README.md not found; skipping.")

          # Output for later steps
          print(f"current={current}")
          print(f"new={new_version}")
          print(f"next_dev={next_dev_version}")
          (root / "NEW_VERSION.txt").write_text(new_version)
          (root / "NEXT_DEV_VERSION.txt").write_text(next_dev_version)
          PY

          echo "new_version=$(cat NEW_VERSION.txt)" >> $GITHUB_OUTPUT
          echo "next_dev_version=$(cat NEXT_DEV_VERSION.txt)" >> $GITHUB_OUTPUT

      - name: Duplicate-tag guard
        shell: bash
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          if git tag -l "v${VERSION}" | grep -q "v${VERSION}"; then
            echo "ERROR: Tag v${VERSION} already exists. Aborting to avoid broken state."
            exit 1
          fi

      - name: Prepend release section to CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.new_version }}"
          release_date="$(date -u +%Y-%m-%d)"

          # Determine previous tag on main
          if prev_tag=$(git describe --tags --abbrev=0 origin/main 2>/dev/null); then
            range="${prev_tag}..HEAD"
          else
            range="HEAD"
          fi

          # Collect commit subjects excluding merges
          mapfile -t COMMITS < <(git log --no-merges --pretty=format:%s "$range" || true)

          # Classify commits by prefix
          FEATURES=()
          FIXES=()
          CHANGES=()
          DATASETS=()
          for s in "${COMMITS[@]:-}"; do
            case "$s" in
              feat:*|feature:*)  FEATURES+=("${s#*: }") ;;
              fix:*|bug:*|bugfix:*)  FIXES+=("${s#*: }") ;;
              change:*)  CHANGES+=("${s#*: }") ;;
              dataset:*) DATASETS+=("${s#*: }") ;;
              *) ;; # ignore dev:, docs:, chore:, style:, etc.
            esac
          done

          # Ensure CHANGELOG.md exists with header
          if [ ! -f CHANGELOG.md ]; then
            printf '%s\n\n%s\n\n' \
              '# Changelog' \
              'All notable changes to this project will be documented in this file.' \
              > CHANGELOG.md
          fi

          # Build new section
          section_file="$(mktemp)"
          {
            printf '## [%s] - %s\n\n' "$VERSION" "$release_date"
            if [ "${#FEATURES[@]}" -gt 0 ]; then
              printf '### Features\n\n'
              for s in "${FEATURES[@]}"; do printf -- '- %s\n' "$s"; done
              printf '\n'
            fi
            if [ "${#FIXES[@]}" -gt 0 ]; then
              printf '### Fixes\n\n'
              for s in "${FIXES[@]}"; do printf -- '- %s\n' "$s"; done
              printf '\n'
            fi
            if [ "${#CHANGES[@]}" -gt 0 ]; then
              printf '### Changes\n\n'
              for s in "${CHANGES[@]}"; do printf -- '- %s\n' "$s"; done
              printf '\n'
            fi
            if [ "${#DATASETS[@]}" -gt 0 ]; then
              printf '### Datasets\n\n'
              for s in "${DATASETS[@]}"; do printf -- '- %s\n' "$s"; done
              printf '\n'
            fi
          } > "$section_file"

          # Prepend new section after header (3 lines)
          new_file="$(mktemp)"
          {
            head -n 3 CHANGELOG.md 2>/dev/null || true
            cat "$section_file"
            if [ -f CHANGELOG.md ]; then
              tail -n +4 CHANGELOG.md
            fi
          } > "$new_file"
          mv "$new_file" CHANGELOG.md

      - name: Commit and tag
        shell: bash
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml spikee/__init__.py README.md CHANGELOG.md || true
          git commit -m "Release ${VERSION}" || echo "No changes to commit."
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Open dev-bump PR to develop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_DEV="${{ steps.bump.outputs.next_dev_version }}"
          BRANCH="chore/bump-${NEXT_DEV}"

          # Fetch develop so we can branch from it
          git fetch origin develop
          git checkout -b "${BRANCH}" origin/develop

          python - <<EOF
          import toml, pathlib, re
          root = pathlib.Path(".")

          # pyproject.toml
          pp = root / "pyproject.toml"
          data = toml.load(pp.open())
          data["project"]["version"] = "${NEXT_DEV}"
          pp.write_text(toml.dumps(data))

          # __init__.py
          initp = root / "spikee" / "__init__.py"
          initp.write_text('__version__ = "${NEXT_DEV}"\n')

          # README.md
          readme = root / "README.md"
          if readme.exists():
              txt = readme.read_text()
              new_txt, n = re.subn(r"(_Version:\s*)(\d+\.\d+\.\d+(?:-dev)?)(\s*_)",
                                   rf"\g<1>${NEXT_DEV}\3", txt, count=1)
              if n:
                  readme.write_text(new_txt)
                  print("Updated README.md to next dev version.")
              else:
                  print("NOTE: README.md version pattern not found; left unchanged.")
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml spikee/__init__.py README.md
          git commit -m "chore: bump version to ${NEXT_DEV}"
          git push origin "${BRANCH}"

          gh pr create \
            --base develop \
            --head "${BRANCH}" \
            --title "chore: bump version to ${NEXT_DEV}" \
            --body "Automated post-release version bump from the release workflow."
